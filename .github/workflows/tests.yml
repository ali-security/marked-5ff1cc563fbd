name: Tests
on:
  push:
  workflow_dispatch:

jobs:
  Test:
    # Node 8 excluded: marked 2.0.6 uses ES2018 named capture groups (?<name>...),
    # which require Node 10+ (V8 6.0+). engines ">= 8.16.2" is too permissive.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
      - name: Install Dependencies
        run: npm ci
      - name: Run Unit Tests 👩🏽‍💻
        run: npm run test:unit
      - name: Run Spec Tests 👩🏽‍💻
        run: npm run test:specs

  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
      - name: Install Dependencies
        run: npm ci
      - name: Build 🗜️
        run: npm run build
      - name: Pack tgz
        run: npm pack
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marked-tgz
          path: marked-*.tgz
          if-no-files-found: error
